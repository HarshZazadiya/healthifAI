<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCANBO - Document Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f1235;
            color: #0670fa;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h2 { color: #60a5fa; margin-bottom: 20px; font-size: 24px; }
        .card {
            background: rgba(30, 30, 58, 0.9);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #0b0b0b; }
        input, button, select {
            padding: 10px 14px; margin: 5px; font-size: 14px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: rgb(255, 255, 255); font-family: inherit;
        }
        input { width: 300px; }
        input:focus, select:focus { outline: none; border-color: #00060c; background: rgba(96,165,250,0.1); }
        button { background: #4f46e5; color: rgb(249, 241, 241); border: none; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        button:hover { background: #6366f1; transform: translateY(-1px); }
        button.btn-sm { padding: 6px 12px; font-size: 12px; }
        button.btn-success { background: #22c55e; }
        button.btn-success:hover { background: #16a34a; }
        iframe { width: 100%; height: 600px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; background: white; }
        img { max-width: 100%; border-radius: 10px; max-height: 70vh; }
        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 12px; }
        .doc-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgb(253, 253, 253);
            border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s;
        }
        .doc-card:hover { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.3); }
        .doc-card .doc-icon { font-size: 28px; margin-bottom: 8px; }
        .doc-card .doc-type { font-weight: 600; font-size: 13px; }
        .doc-card .doc-date { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .case-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: rgba(96,165,250,0.08); border-radius: 10px;
            margin-bottom: 12px; cursor: pointer;
        }
        .case-header:hover { background: rgba(96,165,250,0.15); }
        .badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; }
        .badge-open { background: rgba(34,197,94,0.2); color: #22c55e; }
        .badge-closed { background: rgba(239,68,68,0.2); color: #000000; }
        .badge-requested { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .hidden { display: none; }
        .toast {
            position: fixed; bottom: 20px; right: 20px; background: #1e1e3a;
            border-radius: 12px; padding: 12px 20px; border-left: 4px solid #60a5fa;
            z-index: 1000; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .login-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .user-info { font-size: 13px; color: #000000; margin-top: 8px; }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(96,165,250,0.2);
            border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>SCANBO Document Viewer</h2>
        
        <!-- Login Section -->
        <div class="card" id="login-card">
            <div class="card-title">Login</div>
            <div class="login-row">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Password">
                <select id="login-role">
                    <option value="user">Patient</option>
                    <option value="doctor">Doctor</option>
                </select>
                <button onclick="handleLogin()">Login</button>
            </div>
            <div class="user-info" id="user-info"></div>
        </div>

        <!-- Cases Section -->
        <div class="card hidden" id="cases-card">
            <div class="card-title">My Cases</div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <select id="status-filter" onchange="loadCases()">
                    <option value="">All Status</option>
                    <option value="OPEN">Open</option>
                    <option value="CLOSED">Closed</option>
                    <option value="REQUESTED_BY_USER">Requested by You</option>
                    <option value="REQUESTED_BY_DOCTOR">Requested by Doctor</option>
                </select>
                <button class="btn-sm" onclick="loadCases()">Refresh</button>
                <button class="btn-sm" onclick="logout()" style="background:#ef4444">Logout</button>
                <span style="font-size:13px;color:#94a3b8" id="case-count"></span>
            </div>
            <div id="cases-list" style="margin-top:16px;"></div>
        </div>

        <!-- Viewer Section -->
        <div class="card hidden" id="viewer-card">
            <div class="card-title">Document Viewer</div>
            <button class="btn-sm" onclick="closeViewer()">Back to Cases</button>
            <div id="viewer" style="margin-top:16px;"></div>
        </div>
    </div>

    <script>
        const BASE = 'http://localhost:8000';
        let authToken = localStorage.getItem('scanbo_doc_token') || '';
        let userRole = localStorage.getItem('scanbo_doc_role') || 'user';
        let allCases = [];

        // INIT
        if (authToken) {
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('cases-card').classList.remove('hidden');
            document.getElementById('user-info').textContent = 'Logged in as ' + userRole;
            loadCases();
        }

        // LOGIN
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const role = document.getElementById('login-role').value;

            if (!email || !password) return showToast('Fill all fields', 'error');

            try {
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const res = await fetch(`${BASE}/auth/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');

                authToken = data.access_token;
                userRole = role;
                localStorage.setItem('scanbo_doc_token', authToken);
                localStorage.setItem('scanbo_doc_role', userRole);

                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('cases-card').classList.remove('hidden');
                document.getElementById('user-info').textContent = 'Logged in as ' + userRole;
                showToast('Login successful!', 'success');
                loadCases();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function logout() {
            authToken = '';
            userRole = 'user';
            localStorage.removeItem('scanbo_doc_token');
            localStorage.removeItem('scanbo_doc_role');
            document.getElementById('login-card').classList.remove('hidden');
            document.getElementById('cases-card').classList.add('hidden');
            document.getElementById('viewer-card').classList.add('hidden');
            allCases = [];
        }

        function getHeaders() {
            return {
                'Authorization': 'Bearer ' + authToken,
                'Content-Type': 'application/json'
            };
        }

        // LOAD CASES
        async function loadCases() {
            if (!authToken) return;
            
            const status = document.getElementById('status-filter').value;
            let endpoint = userRole === 'doctor' ? '/doctor/cases' : '/user/cases';
            let url = `${BASE}${endpoint}`;
            if (status) url += `?status=${status}`;

            try {
                const res = await fetch(url, { headers: getHeaders() });
                if (!res.ok) throw new Error('Failed to load cases');
                const data = await res.json();
                allCases = data.cases || [];
                document.getElementById('case-count').textContent = `(${allCases.length} cases)`;
                renderCases();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function renderCases() {
            const container = document.getElementById('cases-list');
            if (!allCases.length) {
                container.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px;">No cases found</p>';
                return;
            }

            container.innerHTML = allCases.map((c, i) => {
                const statusClass = c.status === 'OPEN' ? 'badge-open' : 
                                   c.status === 'CLOSED' ? 'badge-closed' : 'badge-requested';
                const userDocs = c.documents?.user || [];
                const doctorDocs = c.documents?.doctor || [];
                const totalDocs = userDocs.length + doctorDocs.length;

                return `
                    <div>
                        <div class="case-header" onclick="toggleCaseDocs(${i})">
                            <div>
                                <strong>Case #${c.case_id}</strong>
                                ${c.doctor_name ? `<span style="color:#94a3b8;margin-left:8px">Dr. ${c.doctor_name}</span>` : ''}
                                ${c.hospital_name ? `<span style="color:#64748b;margin-left:8px">${c.hospital_name}</span>` : ''}
                            </div>
                            <div style="display:flex;align-items:center;gap:10px">
                                <span style="font-size:12px;color:#94a3b8">${totalDocs} docs</span>
                                <span class="badge ${statusClass}">${c.status}</span>
                                <span id="arrow-${i}" style="color:#94a3b8">&#9660;</span>
                            </div>
                        </div>
                        <div id="case-docs-${i}" style="display:none;padding:0 12px 12px 12px;">
                            ${totalDocs > 0 ? `
                                ${userDocs.length > 0 ? `
                                    <div style="font-size:13px;color:#94a3b8;margin:8px 0">Your Documents (${userDocs.length})</div>
                                    <div class="doc-grid">${userDocs.map(d => renderDocCard(d, 'user')).join('')}</div>
                                ` : ''}
                                ${doctorDocs.length > 0 ? `
                                    <div style="font-size:13px;color:#94a3b8;margin:12px 0 8px 0">Doctor's Documents (${doctorDocs.length})</div>
                                    <div class="doc-grid">${doctorDocs.map(d => renderDocCard(d, 'doctor')).join('')}</div>
                                ` : ''}
                            ` : '<p style="color:#94a3b8;font-size:13px;padding:8px 0">No documents in this case</p>'}
                            ${c.symptoms && c.symptoms.length > 0 ? `
                                <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05)">
                                    <div style="font-size:13px;color:#94a3b8;margin-bottom:6px">Symptoms</div>
                                    ${c.symptoms.map(s => `<span class="badge" style="margin:2px;background:rgba(139,92,246,0.2);color:#a78bfa">${s.name || s.id}</span>`).join(' ')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderDocCard(doc, source) {
            const t = (doc.type || '').toLowerCase();
            const icon = t.includes('prescription') ? 'P' : t.includes('report') ? 'R' : t.includes('image') ? 'I' : 'D';
            const sourceLabel = source === 'doctor' ? 'Doctor' : 'You';
            return `
                <div class="doc-card">
                    <div class="doc-icon">${icon}</div>
                    <div class="doc-type">${doc.type || 'Document'}</div>
                    <div class="doc-date">${doc.date ? new Date(doc.date).toLocaleDateString() : ''}</div>
                    <div class="doc-date">by ${sourceLabel}</div>
                    <div style="margin-top:8px;display:flex;gap:4px;">
                        <button class="btn-sm" onclick="viewDocument('${doc.url}')">View</button>
                        <button class="btn-sm btn-success" onclick="downloadDocument('${doc.url}')">DL</button>
                    </div>
                </div>
            `;
        }

        function toggleCaseDocs(index) {
            const el = document.getElementById(`case-docs-${index}`);
            const arrow = document.getElementById(`arrow-${index}`);
            if (el.style.display === 'none' || el.style.display === '') {
                el.style.display = 'block';
                arrow.innerHTML = '&#9650;';
            } else {
                el.style.display = 'none';
                arrow.innerHTML = '&#9660;';
            }
        }

        // VIEW DOCUMENT
        async function viewDocument(url) {
            document.getElementById('cases-card').classList.add('hidden');
            document.getElementById('viewer-card').classList.remove('hidden');
            
            // FIX: Convert old path format to new query format
            // OLD: /default/api/download/.eJy...
            // NEW: /default/api/download?token=.eJy...
            let fullUrl = url.startsWith('http') ? url : BASE + url;
            if (fullUrl.includes('/api/download/') && !fullUrl.includes('?token=')) {
                const token = fullUrl.split('/api/download/')[1];
                fullUrl = fullUrl.split('/api/download/')[0] + '/api/download?token=' + token;
            }
            
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';

            try {
                const res = await fetch(fullUrl);
                if (!res.ok) throw new Error(`Server returned ${res.status}`);

                const contentType = res.headers.get('content-type') || '';
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);

                if (contentType.includes('application/pdf')) {
                    viewer.innerHTML = `
                        <iframe src="${blobUrl}#toolbar=1" style="width:100%;height:600px;border:none;border-radius:10px;"></iframe>
                        <div style="margin-top:10px;text-align:center;">
                            <button class="btn-sm btn-success" onclick="downloadDocument('${fullUrl}')">Download</button>
                        </div>
                    `;
                } else if (contentType.includes('image/')) {
                    viewer.innerHTML = `
                        <div style="text-align:center;">
                            <img src="${blobUrl}" alt="Document" style="max-height:70vh;">
                            <div style="margin-top:10px;">
                                <button class="btn-sm btn-success" onclick="downloadDocument('${fullUrl}')">Download</button>
                            </div>
                        </div>
                    `;
                } else {
                    viewer.innerHTML = `
                        <div style="text-align:center;padding:40px;">
                            <p>Preview not available.</p>
                            <button class="btn-sm btn-success" style="margin-top:12px;" onclick="downloadDocument('${fullUrl}')">Download</button>
                        </div>
                    `;
                }
            } catch (e) {
                viewer.innerHTML = `<p style="color:#ef4444">Error: ${e.message}</p>`;
            }
        }

        function downloadDocument(url) {
            const fullUrl = url.startsWith('http') ? url : BASE + url;
            const separator = fullUrl.includes('?') ? '&' : '?';
            const downloadUrl = `${fullUrl}${separator}download=true`;
            
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = '';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function closeViewer() {
            document.getElementById('viewer-card').classList.add('hidden');
            document.getElementById('cases-card').classList.remove('hidden');
            document.getElementById('viewer').innerHTML = '';
        }

        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'error' ? '#ef4444' : type === 'success' ? '#22c55e' : '#60a5fa';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
