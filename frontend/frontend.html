<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SCANBO - Intelligent Healthcare Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #0f1235 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(59,130,246,0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59,130,246,0.8);
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0e27 0%, #0f1235 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(59,130,246,0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Auth Container */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: rgba(18, 22, 57, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(59,130,246,0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-title {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-sub {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 32px;
        }
        .role-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        .role-tab {
            padding: 10px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }
        .role-tab:hover {
            background: rgba(59,130,246,0.2);
        }
        .role-tab.active {
            background: #3b82f6;
            color: white;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59,130,246,0.1);
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59,130,246,0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 14px;
        }
        .auth-footer a {
            color: #3b82f6;
            cursor: pointer;
            text-decoration: none;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: none;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            transition: all 0.3s;
            z-index: 100;
        }
        .sidebar.collapsed {
            width: 80px;
        }
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-logo-icon {
            font-size: 28px;
        }
        .sidebar-logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar.collapsed .sidebar-logo-text {
            display: none;
        }
        .sidebar-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            width: 32px;
            height: 32px;
        }
        .sidebar-nav {
            padding: 16px 12px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #94a3b8;
        }
        .nav-item:hover {
            background: rgba(59,130,246,0.1);
            color: white;
        }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(37,99,235,0.1));
            color: #3b82f6;
        }
        .sidebar.collapsed .nav-item span:last-child {
            display: none;
        }
        .nav-icon {
            width: 20px;
            text-align: center;
        }
        .main-content {
            margin-left: 280px;
            transition: all 0.3s;
        }
        .sidebar.collapsed ~ .main-content {
            margin-left: 80px;
        }
        .topbar {
            background: rgba(18, 22, 57, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 99;
        }
        .page-title {
            font-size: 24px;
            font-weight: 700;
        }
        .user-menu {
            position: relative;
            cursor: pointer;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .dropdown-menu {
            position: absolute;
            top: 50px;
            right: 0;
            background: #1e1e3a;
            border-radius: 16px;
            padding: 12px;
            min-width: 240px;
            display: none;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dropdown-item:hover {
            background: rgba(59,130,246,0.1);
        }
        .content-area {
            padding: 32px;
            min-height: calc(100vh - 73px);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(18, 22, 57, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59,130,246,0.3);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 12px;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 14px;
        }
        .card {
            background: rgba(18, 22, 57, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            color: #94a3b8;
            font-weight: 500;
            font-size: 12px;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-success {
            background: rgba(34,197,94,0.2);
            color: #22c55e;
        }
        .badge-warning {
            background: rgba(245,158,11,0.2);
            color: #f59e0b;
        }
        .badge-danger {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
        }
        .badge-info {
            background: rgba(59,130,246,0.2);
            color: #3b82f6;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #1e1e3a;
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
        }
        .toast {
            background: #1e1e3a;
            border-radius: 12px;
            padding: 12px 20px;
            margin-top: 8px;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .map-container {
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
        }
        .chat-container {
            display: flex;
            height: 600px;
            background: rgba(18, 22, 57, 0.8);
            border-radius: 20px;
            overflow: hidden;
        }
        .chat-sidebar {
            width: 300px;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
        }
        .message.sent {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            background: rgba(59,130,246,0.2);
        }
        .message.sent .message-bubble {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        .message-tools {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .chat-input-area {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            color: white;
        }
        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            width: fit-content;
        }
        .thinking-dot {
            width: 6px;
            height: 6px;
            background: #3b82f6;
            border-radius: 50%;
            animation: pulse 1.5s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .ocr-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .ocr-zone:hover {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.05);
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0 !important;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader"></div>
    <div style="margin-top: 20px; font-size: 18px;">Loading SCANBO...</div>
</div>

<div id="auth-container" class="auth-container">
    <div class="auth-card">
        <div class="logo">🏥</div>
        <div class="auth-title">SCANBO</div>
        <div class="auth-sub">Intelligent Healthcare Platform</div>
        
        <div id="login-form">
            <div class="role-tabs">
                <div class="role-tab active" data-role="user">👤 Patient</div>
                <div class="role-tab" data-role="doctor">🩺 Doctor</div>
                <div class="role-tab" data-role="hospital">🏥 Hospital</div>
                <div class="role-tab" data-role="admin">⚙️ Admin</div>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
            <div class="auth-footer">
                Don't have an account? <a onclick="showRegister()">Create one</a>
            </div>
        </div>
        
        <div id="register-form" style="display: none;">
            <div class="role-tabs">
                <div class="role-tab active" data-role="user">👤 Patient</div>
                <div class="role-tab" data-role="doctor">🩺 Doctor</div>
                <div class="role-tab" data-role="hospital">🏥 Hospital</div>
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Enter your name">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Create password">
            </div>
            <div id="reg-extra-fields"></div>
            <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
            <div class="auth-footer">
                Already have an account? <a onclick="showLogin()">Sign In</a>
            </div>
        </div>
    </div>
</div>

<div id="dashboard" class="dashboard-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <span class="sidebar-logo-icon">🏥</span>
                <span class="sidebar-logo-text">SCANBO</span>
            </div>
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
    </div>
    
    <div class="main-content">
        <div class="topbar">
            <div class="page-title" id="page-title">Dashboard</div>
            <div class="user-menu">
                <div class="user-avatar" id="user-avatar" onclick="toggleDropdown()">U</div>
                <div class="dropdown-menu" id="dropdown-menu">
                    <div class="dropdown-item" onclick="navigateTo('profile')">
                        <i class="fas fa-user"></i> My Profile
                    </div>
                    <div class="dropdown-item" onclick="navigateTo('wallet')">
                        <i class="fas fa-wallet"></i> Wallet
                    </div>
                    <div class="dropdown-item" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </div>
                </div>
            </div>
        </div>
        <div class="content-area" id="content-area">
            <div style="text-align: center; padding: 50px;">Loading...</div>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
    const BASE_URL = 'http://localhost:8000';
    let state = {
        token: null,
        role: null,
        type: null,
        user: null,
        currentPage: 'dashboard'
    };
    
    let selectedRole = 'user';
    
    // Helper Functions
    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#3b82f6';
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function showLoading(show) {
        const loader = document.getElementById('loading-screen');
        if (loader) loader.style.display = show ? 'flex' : 'none';
    }
    
    async function apiCall(method, endpoint, body = null) {
        const headers = {
            'Content-Type': 'application/json'
        };
        if (state.token) {
            headers['Authorization'] = `Bearer ${state.token}`;
        }
        const options = {
            method,
            headers
        };
        if (body) {
            options.body = JSON.stringify(body);
        }
        try {
            const response = await fetch(`${BASE_URL}${endpoint}`, options);
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail || 'Request failed');
            }
            return data;
        } catch (error) {
            showToast(error.message, 'error');
            throw error;
        }
    }
    
    // Auth Functions
    function selectRole(role) {
        selectedRole = role;
        document.querySelectorAll('.role-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.role === role);
        });
        updateRegisterFields();
    }
    
    function updateRegisterFields() {
        const extra = document.getElementById('reg-extra-fields');
        if (!extra) return;
        if (selectedRole === 'doctor') {
            extra.innerHTML = `
                <div class="input-group"><label>Hospital ID</label><input type="number" id="reg-hospital-id" placeholder="Enter Hospital ID"></div>
                <div class="input-group"><label>Specialty</label><input type="text" id="reg-specialty" placeholder="e.g., Cardiologist"></div>
            `;
        } else if (selectedRole === 'hospital') {
            extra.innerHTML = `
                <div class="input-group"><label>Phone Number</label><input type="tel" id="reg-phone" placeholder="Contact number"></div>
                <div class="input-group"><label>Address</label><input type="text" id="reg-address" placeholder="Street address"></div>
                <div class="input-group"><label>City</label><input type="text" id="reg-city" placeholder="City"></div>
                <div class="input-group"><label>State</label><input type="text" id="reg-state" placeholder="State"></div>
                <div class="input-group"><label>ZIP Code</label><input type="text" id="reg-zip" placeholder="ZIP code"></div>
            `;
        } else {
            extra.innerHTML = '';
        }
    }
    
    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        if (!email || !password) {
            showToast('Please fill all fields', 'error');
            return;
        }
        showLoading(true);
        try {
            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);
            const response = await fetch(`${BASE_URL}/auth/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || 'Login failed');
            state.token = data.access_token;
            state.role = selectedRole;
            state.type = data.type || selectedRole;
            localStorage.setItem('scanbo_token', state.token);
            localStorage.setItem('scanbo_role', state.role);
            showToast('Login successful!', 'success');
            await loadUserProfile();
            showDashboard();
        } catch (error) {
            showToast(error.message, 'error');
        } finally {
            showLoading(false);
        }
    }
    
    async function handleRegister() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        if (!name || !email || !password) {
            showToast('Please fill all fields', 'error');
            return;
        }
        showLoading(true);
        try {
            let endpoint = '/auth/user';
            let body = { username: name, email, password };
            if (selectedRole === 'doctor') {
                endpoint = '/auth/doctor';
                body = {
                    name,
                    email,
                    password,
                    hospital_id: parseInt(document.getElementById('reg-hospital-id').value),
                    specialty: document.getElementById('reg-specialty').value
                };
            } else if (selectedRole === 'hospital') {
                endpoint = '/auth/hospital';
                body = {
                    name,
                    email,
                    password,
                    address: document.getElementById('reg-address').value,
                    city: document.getElementById('reg-city').value,
                    state: document.getElementById('reg-state').value,
                    zip: document.getElementById('reg-zip').value,
                    phone: document.getElementById('reg-phone').value
                };
            }
            await apiCall('POST', endpoint, body);
            showToast('Account created! Please login.', 'success');
            showLogin();
        } catch (error) {f
            showToast(error.message, 'error');
        } finally {
            showLoading(false);
        }
    }

                        <button class="btn btn-secondary" style="padding:5px 12px;font-size:12px" onclick="event.stopPropagation();showDoctorUploadDocModal(${patient.id}, '${patient.username||patient.name}')">+ Upload</button>

                    </div>
                </div>
                <div id="pdocs-${patient.id}" style="display:none;margin-top:14px;border-top:1px solid rgba(255,255,255,0.08);padding-top:14px">
                    ${pdocs.length ? `
                        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
                            ${pdocs.map(d => `
                                <div class="stat-card" style="padding:14px">
                                    <div><i class="fas fa-file-alt" style="font-size:24px;color:#3b82f6"></i></div>
                                    <div style="margin-top:8px;font-weight:500;font-size:13px">${d.type || 'Document'}</div>
                                    <div style="color:#94a3b8;font-size:11px">ID: ${d.id} · ${d.role === 'doctor' ? 'Uploaded by doctor' : 'Uploaded by patient'}</div>
                                    <div style="margin-top:10px;display:flex;gap:6px">
                                        <button class="btn btn-secondary" style="flex:1;padding:5px;font-size:11px" onclick="viewDocumentPopup('${d.document_path.replace(/\\/g,"/")}','${d.type||"Doc"}')">View</button>

    window.uploadDoctorDocument = async () => {
        const userId = document.getElementById('modal-doc-user-id')?.value;
        const type = document.getElementById('modal-doc-type')?.value;
        const file = document.getElementById('modal-doc-file')?.files[0];
        if (!userId || !type || !file) return showToast('Fill all fields', 'error');
        // POST /default/documents expects multipart/form-data with:
        //   file   = UploadFile
        //   user_id = Form (int, required for doctors)
        //   type    = Form (str)
        const formData = new FormData();
        formData.append('file', file);
        formData.append('user_id', parseInt(userId));
        formData.append('type', type);
        const response = await fetch(`${BASE_URL}/default/documents`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${state.token}` },
            // Do NOT set Content-Type — browser sets it with boundary automatically
            body: formData
        });
        if (response.ok) {
            showToast('Document uploaded successfully', 'success');
            closeModal();
            navigateTo('documents');
        } else {
            const err = await response.json().catch(() => ({}));
            showToast(err.detail || 'Upload failed', 'error');
        }
    };

    window.findNearbyDoctors = async () => {
        if (!navigator.geolocation) return showToast('Geolocation not supported', 'error');
        showToast('Getting your location...', 'info');
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            // Update user location
            await apiCall('PUT', '/user/location', { latitude, longitude }).catch(() => {});
            const limit = parseInt(document.getElementById('nearby-limit')?.value || 10);
            showToast('Searching for nearby doctors...', 'info');
            try {
                let rawData = await apiCall('GET', `/user/nearby-doctors/${limit}`).catch(() => []);
                // handle both plain array and wrapped {doctors: [...]} response
                const data = Array.isArray(rawData) ? rawData : (rawData?.doctors || rawData?.data || []);

                // Clear old markers
                nearbyMapMarkers.forEach(m => m.remove());
                nearbyMapMarkers = [];

                if (!currentMap) return;
                currentMap.setView([latitude, longitude], 12);

                // User marker
                const userIcon = L.divIcon({
                    html: `<div style="background:#3b82f6;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 0 16px #3b82f688;font-size:15px">📍</div>`,
                    className: '', iconSize: [34,34], iconAnchor: [17,17]
                });
                const userMarker = L.marker([latitude, longitude], { icon: userIcon })
                    .bindPopup('<b>Your Location</b>').addTo(currentMap);
                nearbyMapMarkers.push(userMarker);

                // Group by hospital
                const hospitalMap = {};
                (data || []).forEach(doc => {
                    const key = doc.hospital_name || 'Unknown Hospital';
                    if (!hospitalMap[key]) {
                        hospitalMap[key] = {
                            name: key,
                            lat: doc.hospital_lat,
                            lon: doc.hospital_lon,
                            address: doc.hospital_address,
                            distance_km: doc.distance_km,
                            doctors: []
                        };
                    }
                    hospitalMap[key].doctors.push(doc);
                });

                const hospitals = Object.values(hospitalMap).sort((a,b) => a.distance_km - b.distance_km);

                // Add hospital markers to map
                hospitals.forEach((hosp, idx) => {
                    if (!hosp.lat || !hosp.lon) return;
                    const hospIcon = L.divIcon({
                        html: `<div style="background:#ef4444;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 0 12px #ef444488;font-size:16px">🏥</div>`,
                        className: '', iconSize: [34,34], iconAnchor: [17,17]
                    });
                    const marker = L.marker([hosp.lat, hosp.lon], { icon: hospIcon })
                        .bindPopup(`<b>🏥 ${hosp.name}</b><br>${hosp.address || ''}<br>📍 ${hosp.distance_km?.toFixed(1)} km away<br>🩺 ${hosp.doctors.length} doctor(s)`)
                        .addTo(currentMap);
                    marker.on('click', () => {
                        document.getElementById(`hospital-card-${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    });
                    nearbyMapMarkers.push(marker);
                });

                // Doctor markers with slight offset
                (data || []).forEach(doc => {
                    if (!doc.hospital_lat || !doc.hospital_lon) return;
                    const offset = (Math.random() - 0.5) * 0.005;
                    const docIcon = L.divIcon({
                        html: `<div style="background:#22c55e;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 0 10px #22c55e88;font-size:13px">🩺</div>`,
                        className: '', iconSize: [28,28], iconAnchor: [14,14]
                    });
                    const m = L.marker([doc.hospital_lat + offset, doc.hospital_lon + offset], { icon: docIcon })
                        .bindPopup(`<b>🩺 Dr. ${doc.name}</b><br>Specialty: ${doc.specialty}<br>🏥 ${doc.hospital_name}<br>📍 ${doc.distance_km?.toFixed(1)} km`)
                        .addTo(currentMap);
                    nearbyMapMarkers.push(m);
                });

                // Update legend
                const legendEl = document.getElementById('nearby-map-legend');
                if (legendEl) legendEl.innerHTML = `<span>📍 Your Location</span> <span>🏥 ${hospitals.length} hospitals found</span> <span>🩺 ${(data||[]).length} doctors found</span>`;

                // Render hospital list below map
                const listEl = document.getElementById('nearby-hospitals-list');
                if (!listEl) return;

                if (!hospitals.length) {
                    listEl.innerHTML = '<div class="card"><p style="text-align:center;color:#94a3b8">No nearby doctors found within 100km. Try updating your location.</p></div>';
                    return;
                }

                listEl.innerHTML = `
                    <div style="margin-bottom:12px;font-size:14px;color:#94a3b8">${hospitals.length} hospital(s) found near you</div>
                    ${hospitals.map((hosp, idx) => `
                        <div class="card" id="hospital-card-${idx}" style="margin-bottom:16px;cursor:pointer" onclick="toggleHospitalDoctors(${idx})">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <div style="display:flex;align-items:center;gap:14px">
                                    <div style="font-size:32px">🏥</div>
                                    <div>
                                        <div style="font-weight:600;font-size:16px">${hosp.name}</div>
                                        <div style="color:#94a3b8;font-size:13px;margin-top:2px">${hosp.address || ''}</div>
                                        <div style="display:flex;gap:12px;margin-top:6px">
                                            <span class="badge badge-info">📍 ${hosp.distance_km?.toFixed(1)} km away</span>
                                            <span class="badge badge-success">🩺 ${hosp.doctors.length} doctor(s)</span>
                                        </div>
                                    </div>
                                </div>
                                <div style="font-size:20px;color:#94a3b8;transition:transform 0.3s" id="hosp-arrow-${idx}">▼</div>
                            </div>
                            <div id="hosp-doctors-${idx}" style="display:none;margin-top:16px;border-top:1px solid rgba(255,255,255,0.08);padding-top:16px">
                                <div style="font-size:13px;color:#94a3b8;margin-bottom:10px;font-weight:500">Doctors (sorted by rating)</div>
                                ${hosp.doctors
                                    .sort((a, b) => (b.rating || 0) - (a.rating || 0))
                                    .map(doc => `
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
                                        <div style="display:flex;align-items:center;gap:12px">
                                            <div style="width:38px;height:38px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🩺</div>
                                            <div>
                                                <div style="font-weight:500">${doc.name}</div>
                                                <div style="color:#94a3b8;font-size:12px">${doc.specialty}</div>
                                            </div>
                                        </div>
                                        <div style="display:flex;align-items:center;gap:12px">
                                            <div style="text-align:right">
                                                <div style="font-size:13px;color:#f59e0b">⭐ ${doc.rating || 'N/A'}</div>
                                                <div style="font-size:12px;color:#94a3b8">Rating</div>
                                            </div>
                                            <button class="btn btn-primary" style="padding:6px 14px;font-size:12px" onclick="event.stopPropagation();assignDoctor(${doc.id})">Assign</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                `;
                showToast(`Found ${hospitals.length} hospital(s) and ${(data||[]).length} doctor(s) nearby!`, 'success');
            } catch(e) {
                showToast('Could not load nearby doctors: ' + e.message, 'error');
            }
        }, () => showToast('Location access denied', 'error'));
    };

    window.captureFromCamera = () => {
        const video = document.getElementById('ocr-video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        document.getElementById('ocr-preview').style.display = 'block';
        document.getElementById('ocr-img').src = canvas.toDataURL('image/jpeg');
        video.srcObject.getTracks().forEach(t => t.stop());
        video.style.display = 'none';
        document.getElementById('ocr-capture-btn').style.display = 'none';
    };

                body: JSON.stringify({

                    max_tokens: 1000,
                    messages: [{ role: 'user', content: 'Analyze this prescription image and provide medicine names, dosage, and warnings.' }]
                })
            });
            const data = await response.json();
            resultDiv.innerHTML = `<div class="card"><pre style="white-space:pre-wrap">${data.content?.[0]?.text || 'Analysis complete'}</pre></div>`;

        modal.className = 'modal show';

        if (size === 'large') modalWidth = '800px';
        if (size === 'full') modalWidth = '90%';
        
        modal.innerHTML = `
            <div class="modal-content" style="max-width: ${modalWidth}; width: 100%;">
                <div style="display:flex;justify-content:space-between;margin-bottom:20px">
                    <h3>${title}</h3>
                    <button onclick="closeModal()" style="background:none;border:none;color:white;font-size:24px;cursor:pointer">&times;</button>
                </div>
                ${content}
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    window.closeModal = () => {
        document.getElementById('global-modal')?.remove();
    };
    
    // Close dropdown on click outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.user-menu')) {
            document.getElementById('dropdown-menu')?.classList.remove('show');
        }
    });
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        const savedToken = localStorage.getItem('scanbo_token');
        const savedRole = localStorage.getItem('scanbo_role');
        if (savedToken && savedRole) {
            state.token = savedToken;
            state.role = savedRole;
            showLoading(true);
            loadUserProfile().then(() => {
                showDashboard();
                showLoading(false);
            }).catch(() => {
                showLoading(false);
                showLogin();
            });
        } else {
            showLoading(false);
            showLogin();
        }
        document.querySelectorAll('.role-tab').forEach(tab => {
            tab.addEventListener('click', () => selectRole(tab.dataset.role));
        });
    });
</script>
</body>
</html>
